<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cube Soccer Online</title>
    
    <!-- 1. Move these to the VERY top of the Head -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.ably.com"></script>

    <style>
        /* Keep your CSS here */
        body { margin: 0; overflow: hidden; background: #111; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; color: white; text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>

<body>

<div id="score">RED 0 - 0 BLUE</div>

<div id="ui">
    <h1>CUBE SOCCER</h1>
    <p>Use WASD to move & kick!</p>
    <input type="text" id="username" placeholder="Enter Nickname...">
    <input type="password" id="room-pass" placeholder="Room Password (Optional)">
    <button onclick="initGame()">JOIN/HOST MATCH</button>
    <p style="font-size: 12px; color: #888;">Multiplayer powered by Ably</p>
</div>

<script>
// --- CONFIGURATION ---
const ABLY_KEY = 'c5rg5g.YVwTxw:Be3r-ssmhAmLyGFurtKpkoxhdOIPhSeKQY-S3GB8Df4';
let myId = Math.random().toString(36).substring(7);
let players = {};
let gameStarted = false;
let ballVelocity = { x: 0, z: 0 };

// --- THREE.JS SCENE ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Environment
const floor = new THREE.Mesh(new THREE.BoxGeometry(30, 0.1, 50), new THREE.MeshStandardMaterial({ color: 0x2d5a27 }));
scene.add(floor);

// Goals
const goalGeo = new THREE.BoxGeometry(8, 4, 1);
const goalRed = new THREE.Mesh(goalGeo, new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0.5 }));
goalRed.position.z = -24;
scene.add(goalRed);

const goalBlue = new THREE.Mesh(goalGeo, new THREE.MeshStandardMaterial({ color: 0x0000ff, transparent: true, opacity: 0.5 }));
goalBlue.position.z = 24;
scene.add(goalBlue);

// Ball
const ball = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
ball.position.y = 0.5;
scene.add(ball);

// Lights
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(10, 20, 10);
scene.add(light, new THREE.AmbientLight(0x606060));

camera.position.set(0, 20, 25);
camera.lookAt(0, 0, 0);

// --- MULTIPLAYER LOGIC ---
let ably, channel;

function initGame() {
    const name = document.getElementById('username').value || "Guest";
    document.getElementById('ui').style.display = 'none';
    
    ably = new Ably.Realtime(ABLY_KEY);
    channel = ably.channels.get('global-soccer');

    // Create My Local Player
    players[myId] = createPlayerMesh(0x00ff00); // Green for "You"
    gameStarted = true;

    // Listen for others
    channel.subscribe('update', (msg) => {
        if (msg.data.id === myId) return;
        if (!players[msg.data.id]) players[msg.data.id] = createPlayerMesh(0xffffff);
        
        players[msg.data.id].position.x = msg.data.px;
        players[msg.data.id].position.z = msg.data.pz;
        
        // Sync ball from whoever is moving it
        if(msg.data.isKicking) {
            ball.position.x = msg.data.bx;
            ball.position.z = msg.data.bz;
        }
    });

    // Send my position every 50ms
    setInterval(() => {
        if (gameStarted) {
            channel.publish('update', {
                id: myId,
                px: players[myId].position.x,
                pz: players[myId].position.z,
                bx: ball.position.x,
                bz: ball.position.z,
                isKicking: players[myId].position.distanceTo(ball.position) < 1.5
            });
        }
    }, 50);
}

function createPlayerMesh(color) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({ color }));
    mesh.position.y = 0.6;
    scene.add(mesh);
    return mesh;
}

// --- CONTROLS & PHYSICS ---
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function animate() {
    requestAnimationFrame(animate);
    
    if (gameStarted && players[myId]) {
        const p = players[myId];
        const speed = 0.15;
        if (keys['KeyW']) p.position.z -= speed;
        if (keys['KeyS']) p.position.z += speed;
        if (keys['KeyA']) p.position.x -= speed;
        if (keys['KeyD']) p.position.x += speed;

        // Kick Physics
        const dist = p.position.distanceTo(ball.position);
        if (dist < 1.2) {
            ballVelocity.x = (ball.position.x - p.position.x) * 0.4;
            ballVelocity.z = (ball.position.z - p.position.z) * 0.4;
        }
    }

    // Ball movement & Friction
    ball.position.x += ballVelocity.x;
    ball.position.z += ballVelocity.z;
    ballVelocity.x *= 0.96;
    ballVelocity.z *= 0.96;

    // Boundaries
    if (Math.abs(ball.position.x) > 14.5) ballVelocity.x *= -1;
    if (Math.abs(ball.position.z) > 24.5) {
        // Goal Check
        if (Math.abs(ball.position.x) < 4) {
            alert("GOAL!");
            ball.position.set(0, 0.5, 0);
            ballVelocity = {x:0, z:0};
        } else {
            ballVelocity.z *= -1;
        }
    }

    renderer.render(scene, camera);
}
animate();

// Handle Window Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
